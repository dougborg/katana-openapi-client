name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_publish_client:
        description: 'Force publish client to PyPI (even without new release)'
        type: boolean
        default: false
      force_publish_mcp:
        description: 'Force publish MCP to PyPI (even without new release)'
        type: boolean
        default: false

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run full CI pipeline
        run: uv run poe ci
        env:
          CI_DOCS_BUILD: "true"
          NO_MKDOCS_2_WARNING: "true"
          DISABLE_MKDOCS_2_WARNING: "true"

  release-client:
    needs: test
    runs-on: ubuntu-latest
    concurrency:
      group: release-client
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: write
    outputs:
      released: ${{ steps.release.outputs.released }}
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          token: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Check for client changes
        id: check
        run: |
          # Check if there are any commits with (client) scope or no scope since last
          # client release. The optional ``!`` between ``(scope)`` and ``:`` matches
          # the Conventional Commits breaking-change form (e.g. ``feat(client)!:``)
          # so a major-version bump isn't silently skipped — see #451.
          if git log $(git describe --tags --abbrev=0 --match="client-v*" 2>/dev/null || \
            echo "HEAD~10")..HEAD --pretty=format:"%s" | \
            grep -qE '^(feat|fix|perf)(\(client\))?!?:'; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Python Semantic Release (Client)
        if: steps.check.outputs.has_changes == 'true'
        id: release
        uses: python-semantic-release/python-semantic-release@350c48fcb3ffcdfd2e0a235206bc2ecea6b69df0 # v10.5.3
        with:
          github_token: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
          verbosity: 2

      - name: Build client package
        if: >-
          (steps.release.outcome == 'success' &&
          steps.release.outputs.released == 'true') ||
          inputs.force_publish_client == true
        run: uv build

      - name: Upload client build artifacts
        if: >-
          (steps.release.outcome == 'success' &&
          steps.release.outputs.released == 'true') ||
          inputs.force_publish_client == true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: client-dist
          path: dist/

  release-mcp:
    needs: test
    runs-on: ubuntu-latest
    concurrency:
      group: release-mcp
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: write
    outputs:
      released: ${{ steps.release.outputs.released }}
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          token: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Check for MCP changes
        id: check
        run: |
          # Check if there are any commits with (mcp) scope since last mcp release.
          # The optional ``!`` between ``(mcp)`` and ``:`` matches the Conventional
          # Commits breaking-change form (e.g. ``feat(mcp)!:``) so a major-version
          # bump isn't silently skipped — see #451.
          if git log $(git describe --tags --abbrev=0 --match="mcp-v*" 2>/dev/null || \
            echo "HEAD~10")..HEAD --pretty=format:"%s" | \
            grep -qE '^(feat|fix|perf)\(mcp\)!?:'; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Python Semantic Release (MCP)
        if: steps.check.outputs.has_changes == 'true'
        id: release
        uses: python-semantic-release/python-semantic-release@350c48fcb3ffcdfd2e0a235206bc2ecea6b69df0 # v10.5.3
        with:
          github_token: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
          verbosity: 2
          directory: katana_mcp_server

      - name: Build MCP package
        if: >-
          (steps.release.outcome == 'success' &&
          steps.release.outputs.released == 'true') ||
          inputs.force_publish_mcp == true
        run: cd katana_mcp_server && uv build

      - name: Upload MCP build artifacts
        if: >-
          (steps.release.outcome == 'success' &&
          steps.release.outputs.released == 'true') ||
          inputs.force_publish_mcp == true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mcp-dist
          path: dist/

  publish-client-pypi:
    name: Publish Client to PyPI
    needs: release-client
    if: needs.release-client.outputs.released == 'true' || inputs.force_publish_client == true
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download client build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: client-dist
          path: dist/

      - name: Publish client to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1 (v1.14.0)
        with:
          attestations: true

  publish-mcp-pypi:
    name: Publish MCP to PyPI
    needs: release-mcp
    if: needs.release-mcp.outputs.released == 'true' || inputs.force_publish_mcp == true
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download MCP build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mcp-dist
          path: dist/

      - name: Publish MCP to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1 (v1.14.0)
        with:
          attestations: true

  sync-lockfile:
    name: Sync uv.lock after releases
    needs: [release-client, release-mcp]
    if: |
      always() &&
      (needs.release-client.outputs.released == 'true' ||
       needs.release-mcp.outputs.released == 'true')
    runs-on: ubuntu-latest
    # Serialize this job across overlapping Release runs: it pushes to main, so
    # two concurrent instances could race (the second push rejected as
    # non-fast-forward). Queueing (cancel-in-progress: false) means a later run
    # re-locks on top of the earlier run's lock commit instead of clobbering it.
    concurrency:
      group: sync-lockfile
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      # CRITICAL: check out the *post-release* tip of main, not the workflow's
      # triggering SHA. python-semantic-release (in the release-client /
      # release-mcp jobs this job `needs`) pushes the `chore(release)` version
      # bump commits to main *after* this run started, so the default
      # checkout (github.sha = the pre-release commit) would carry the OLD
      # pyproject versions — re-locking there would be a no-op and the lock
      # would never catch up (#901). `ref: main` + an explicit reset to
      # origin/main guarantees we see the bumped versions before re-locking.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}

      - name: Fast-forward to the post-release tip of main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.14"

      # `uv lock` updates only the lockfile (no env install needed) to match the
      # just-bumped package versions in pyproject.toml.
      - name: Re-lock to match the released versions
        run: uv lock

      - name: Commit if changed
        run: |
          if git diff --quiet uv.lock; then
            echo "uv.lock already matches the released versions"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add uv.lock
            git commit -m "chore: sync uv.lock after release"
            git push origin main
          fi

  publish-mcp-docker:
    name: Publish MCP Docker Image
    needs: [publish-client-pypi, publish-mcp-pypi, release-client, release-mcp]
    if: |
      always() &&
      (needs.release-client.outputs.released == 'true' ||
       needs.release-mcp.outputs.released == 'true' ||
       inputs.force_publish_mcp == true)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Determine MCP version for tagging
        id: version
        env:
          # Pass via env rather than inline ${{ }} to avoid template injection
          # into the run block (zizmor: template-injection).
          MCP_VERSION: ${{ needs.release-mcp.outputs.version }}
        run: |
          if [ -n "$MCP_VERSION" ]; then
            echo "mcp_version=$MCP_VERSION" >> $GITHUB_OUTPUT
          else
            # No MCP release this run — use the latest mcp-v* tag
            LATEST_TAG=$(git tag --list 'mcp-v*' --sort=-version:refname | head -n 1)
            echo "mcp_version=${LATEST_TAG#mcp-v}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/katana-mcp-server
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.mcp_version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.mcp_version }}
            type=semver,pattern={{major}},value=${{ steps.version.outputs.mcp_version }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./katana_mcp_server
          file: ./katana_mcp_server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
