name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new workflow with the same group name is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Detect if code changes warrant full CI run
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      spec: ${{ steps.filter.outputs.spec }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - '!docs/**'
              - '!mkdocs.yml'
              - '!*.md'
              - '!LICENSE'
              - '!.github/copilot-instructions.md'
              - '!.github/pull_request_template.md'
              - '!.github/agents/**'
              - '!.github/instructions/**'
              - '!.github/prompts/**'
            spec:
              - 'docs/katana-openapi.yaml'
              - 'docs/upstream-specs/**'

  test:
    needs: changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # Don't cancel other matrix jobs if one fails
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Skip for docs-only changes
        if: needs.changes.outputs.code == 'false'
        run: echo "Skipping tests for documentation-only changes"

      - name: Checkout code
        if: needs.changes.outputs.code == 'true'
        uses: actions/checkout@v6

      - name: Install uv
        if: needs.changes.outputs.code == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        if: needs.changes.outputs.code == 'true'
        run: uv sync --all-extras

      - name: Check code formatting
        if: needs.changes.outputs.code == 'true'
        run: uv run poe format-check

      - name: Run linting and type checking
        if: needs.changes.outputs.code == 'true'
        run: uv run poe lint

      - name: Run tests
        if: needs.changes.outputs.code == 'true'
        run: uv run poe test-coverage

      - name: Upload coverage to Codecov
        if: needs.changes.outputs.code == 'true'
        uses: codecov/codecov-action@v7
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # Headless-browser render tests for Prefab UI cards. Runs `poe
  # test-browser`, which spins up `fastmcp dev apps` against a minimal
  # MCP server in `katana_mcp_server/tests/browser/render_test_server.py`
  # and drives the iframe via Playwright + Chromium. Catches the
  # blank-iframe / "valid wire envelope but unrenderable" bug class
  # that the Python-side unit tests can't see.
  #
  # Single Python version (3.14) — the JS renderer doesn't care which
  # Python launched it, and re-running across the matrix would burn
  # ~5 minutes for no signal.
  browser-test:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Skip for docs-only changes
        if: needs.changes.outputs.code == 'false'
        run: echo "Skipping browser tests for documentation-only changes"

      - name: Checkout code
        if: needs.changes.outputs.code == 'true'
        uses: actions/checkout@v6

      - name: Install uv
        if: needs.changes.outputs.code == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.14"

      - name: Install dependencies
        if: needs.changes.outputs.code == 'true'
        run: uv sync --all-extras

      - name: Cache Playwright browsers
        if: needs.changes.outputs.code == 'true'
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          # Bust the cache when the playwright pin changes — the
          # browser build is pinned to the SDK version.
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install Chromium for Playwright
        if: needs.changes.outputs.code == 'true'
        run: uv run playwright install --with-deps chromium

      - name: Run browser-render tests
        if: needs.changes.outputs.code == 'true'
        run: uv run poe test-browser

  quality:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Skip for docs-only changes
        if: needs.changes.outputs.code == 'false' && needs.changes.outputs.spec == 'false'
        run: echo "Skipping quality checks for documentation-only changes"

      - name: Checkout code
        if: needs.changes.outputs.code == 'true' || needs.changes.outputs.spec == 'true'
        uses: actions/checkout@v6

      - name: Install uv
        if: needs.changes.outputs.code == 'true' || needs.changes.outputs.spec == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.14"

      - name: Install dependencies
        if: needs.changes.outputs.code == 'true' || needs.changes.outputs.spec == 'true'
        run: uv sync --all-extras

      - name: Validate OpenAPI specification
        if: needs.changes.outputs.code == 'true' || needs.changes.outputs.spec == 'true'
        run: uv run poe validate-openapi

      - name: Validate inline spec examples
        if: needs.changes.outputs.code == 'true' || needs.changes.outputs.spec == 'true'
        run: uv run poe validate-examples

      - name: Build documentation
        if: needs.changes.outputs.code == 'true'
        run: uv run poe docs-build
        env:
          CI_DOCS_BUILD: "true"
          # Silences the "Warning from the Material for MkDocs team" prep-banner
          # ahead of the MkDocs 2.0 transition (handled separately).
          NO_MKDOCS_2_WARNING: "true"
          # Silences the promotional banner injected by `properdocs`, pulled in
          # transitively as a hard requirement of mkdocs-gen-files /
          # mkdocs-literate-nav. See follow-up issue.
          DISABLE_MKDOCS_2_WARNING: "true"

      - name: Test documentation
        if: needs.changes.outputs.code == 'true'
        run: uv run poe test-docs
        env:
          CI_DOCS_BUILD: "true"
          NO_MKDOCS_2_WARNING: "true"
          DISABLE_MKDOCS_2_WARNING: "true"

  # Regenerate the client + pydantic models from the spec and fail if the
  # committed output drifts from what the (now exactly-pinned) generators
  # produce. Catches the failure mode in #874: a loose codegen floor silently
  # changed generated types and nothing flagged it because no check regenerated.
  generated-files:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Skip for docs-only changes
        if: needs.changes.outputs.code == 'false' && needs.changes.outputs.spec == 'false'
        run: echo "Skipping generated-file freshness check for documentation-only changes"

      - name: Checkout code
        if: needs.changes.outputs.code == 'true' || needs.changes.outputs.spec == 'true'
        uses: actions/checkout@v6

      - name: Install uv
        if: needs.changes.outputs.code == 'true' || needs.changes.outputs.spec == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.14"

      - name: Install dependencies
        if: needs.changes.outputs.code == 'true' || needs.changes.outputs.spec == 'true'
        run: uv sync --all-extras

      # Only the Python generators are byte-checked here: datamodel-code-generator
      # + regenerate_client.py produce identical output across OSes, so a
      # `git status` drift check is reliable. The TypeScript client is verified
      # functionally in the separate `typescript-client` job instead — its
      # generator (@hey-api/openapi-ts) shells out to native, per-platform
      # binaries (@esbuild/*, @biomejs/*), so its output is NOT byte-identical
      # macOS↔Linux and a cross-OS drift check would false-positive.
      - name: Regenerate Python client + pydantic models
        if: needs.changes.outputs.code == 'true' || needs.changes.outputs.spec == 'true'
        run: |
          uv run poe regenerate-client
          uv run poe generate-pydantic

      - name: Fail if generated files are stale
        if: needs.changes.outputs.code == 'true' || needs.changes.outputs.spec == 'true'
        run: |
          # Scope to the whole client package, not an enumerated list: besides
          # api/, models/, client.py, and models_pydantic/_generated/,
          # regenerate_client.py also rewrites errors.py, client_types.py,
          # py.typed, and the templated __init__.py. Hand-maintained files in the
          # package (katana_client.py, helpers/, domain/, etc.) aren't rewritten
          # by the generators, so they never produce a spurious diff here.
          #
          # Use `git status --porcelain` (not `git diff`): it reports modified
          # tracked files AND new *untracked* files, so a generator that starts
          # emitting an additional file/directory can't slip through (plain
          # `git diff` ignores untracked paths).
          drift="$(git status --porcelain -- katana_public_api_client/)"
          if [ -n "$drift" ]; then
            echo "::error::Generated files are out of date. Run 'uv run poe regenerate-all' and commit the result."
            echo "Drift detected under katana_public_api_client/:"
            echo "$drift"
            exit 1
          fi

  # Functional gate for the TypeScript client (packages/katana-client). Its
  # generator (@hey-api/openapi-ts) shells out to native per-platform binaries,
  # so the committed output isn't byte-identical across OSes and a `git status`
  # drift check would false-positive on Linux CI for a macOS-generated commit
  # (and vice versa). Instead of byte-diffing, we verify the client *works*:
  #   1. the committed client typechecks + its tests pass, AND
  #   2. regenerating from the current spec still produces a client that
  #      typechecks — i.e. a spec change can't leave the TS client broken.
  typescript-client:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Skip for docs-only changes
        if: needs.changes.outputs.code == 'false' && needs.changes.outputs.spec == 'false'
        run: echo "Skipping TypeScript client checks for documentation-only changes"

      - name: Checkout code
        if: needs.changes.outputs.code == 'true' || needs.changes.outputs.spec == 'true'
        uses: actions/checkout@v6

      - name: Setup Node
        if: needs.changes.outputs.code == 'true' || needs.changes.outputs.spec == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: packages/katana-client/package-lock.json

      - name: Install dependencies
        if: needs.changes.outputs.code == 'true' || needs.changes.outputs.spec == 'true'
        run: npm ci
        working-directory: packages/katana-client

      - name: Lint
        if: needs.changes.outputs.code == 'true' || needs.changes.outputs.spec == 'true'
        run: npm run lint
        working-directory: packages/katana-client

      - name: Typecheck committed client
        if: needs.changes.outputs.code == 'true' || needs.changes.outputs.spec == 'true'
        run: npm run typecheck
        working-directory: packages/katana-client

      - name: Test committed client
        if: needs.changes.outputs.code == 'true' || needs.changes.outputs.spec == 'true'
        run: npm test
        working-directory: packages/katana-client

      - name: Regenerate from the spec and typecheck the result
        if: needs.changes.outputs.code == 'true' || needs.changes.outputs.spec == 'true'
        run: |
          # A spec change must leave the TS client regenerable + valid. We don't
          # byte-diff the result (cross-OS generator output isn't stable), but a
          # regenerated client that fails typecheck means the spec broke it.
          npm run generate
          npm run typecheck
        working-directory: packages/katana-client
