name: Release MCP Server

on:
  push:
    tags:
      - 'mcp-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0a1)'
        required: true

# Least privilege at the workflow level; jobs opt into the scopes they need.
permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          # No dependency cache in the release build — a poisoned cache could
          # contaminate the published artifact (zizmor: cache-poisoning).
          enable-cache: false
          python-version: "3.14"

      - name: Install dependencies
        run: |
          cd katana_mcp_server
          uv sync

      - name: Run tests
        run: |
          cd katana_mcp_server
          uv run pytest tests/ -m "not integration"

      - name: Build package
        run: |
          cd katana_mcp_server
          uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: katana_mcp_server/dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1 (v1.14.0)
        with:
          packages-dir: dist/
          attestations: true
