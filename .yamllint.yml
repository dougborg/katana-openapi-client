# yamllint configuration for katana-openapi-client
# See https://yamllint.readthedocs.io/ for documentation

extends: default

rules:
  line-length:
    max: 120
    level: error
    # Ignore line length in the human-edited OpenAPI spec; the upstream-
    # derived specs in ``docs/upstream-specs/`` are completely ignored
    # below (they're auto-generated by ``poe refresh-upstream-spec``,
    # not edited).
    ignore: |
      /docs/katana-openapi.yaml

  document-start:
    # Don't require --- at start of YAML files
    present: false

  truthy:
    # Allow various boolean representations
    allowed-values: ['true', 'false', 'yes', 'no', 'True', 'False']

  comments:
    min-spaces-from-content: 1

  indentation:
    spaces: 2

  brackets:
    min-spaces-inside: 0
    max-spaces-inside: 1

  braces:
    min-spaces-inside: 0
    max-spaces-inside: 1

# Ignore these paths completely
ignore: |
  .venv/
  .claude/worktrees/
  node_modules/
  dist/
  build/
  site/
  *.egg-info/
  katana_public_api_client/generated/
  docs/original openapi files/
  pnpm-lock.yaml
  # Upstream-derived OpenAPI specs — auto-generated by
  # ``poe refresh-upstream-spec`` (yaml.safe_dump output). PyYAML's
  # default indentation differs from yamllint's expectations; we don't
  # enforce style on machine-generated artefacts.
  docs/upstream-specs/
